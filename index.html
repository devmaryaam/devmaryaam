<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maryam | Portfolio</title>
<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #0d0d0d;
  color: #fff;
  text-align: center;
  padding: 2vh;
  transition: 0.3s;
}
h1 {
  font-size: 3vh;
  font-weight: 700;
  margin: 1vh 0;
}
p {
  font-size: 2vh;
  margin: 1vh 0;
}
.card {
  background: #1a1a1a;
  margin: 2vh auto;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 0 15px #ff4fa3;
  border-radius: 15px;
  padding: 2vh;
  border: 2px solid #ff4fa3;
}
img {
  width: 15vh;
  height: 15vh;
  border-radius: 50%;
  border: 3px solid #ff4fa3;
}
.btn {
  background: #ff4fa3;
  border: none;
  color: #fff;
  padding: 1vh 2vh;
  border-radius: 1vh;
  font-size: 2vh;
  cursor: pointer;
  margin: 1vh;
}
.body-light {
  background: #f8f8f8;
  color: #111;
}
.body-light .card {
  background: #fff;
  color: #111;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>
<div class="card">
  <img src="https://i.ibb.co/your-image-link.jpg" alt="Maryam">
  <h1>Hi, I’m Maryam 👑</h1>
  <p>Frontend developer learning HTML, CSS, JS</p>
  <button class="btn" onclick="document.body.classList.toggle('body-light')">Toggle Mode</button>
</div>

<div class="card">
  <h2>Projects</h2>
  <p>Day 1 - My first page</p>
  <p>Day 2 - Portfolio with dark mode</p>
</div>
</body>
</html>
